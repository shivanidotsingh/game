<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>knot easy</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100vh; overflow: hidden; background: #f5f4f0; }
#c { display: block; width: 100%; height: 100vh; cursor: grab; }
.hint {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 11px; letter-spacing: 0.06em;
  color: rgba(20,18,15,0.35);
  font-family: -apple-system, sans-serif;
  pointer-events: none; white-space: nowrap;
}
</style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥨</text></svg>">
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const DPR = devicePixelRatio || 1;

function resize() {
  canvas.width = canvas.offsetWidth * DPR;
  canvas.height = canvas.offsetHeight * DPR;
  ctx.scale(DPR, DPR);
}
resize();
window.addEventListener('resize', () => { resize(); initialised = false; });

const W = () => canvas.offsetWidth;
const H = () => canvas.offsetHeight;
const CX = () => W() / 2;
const CY = () => H() / 2;

const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const FG = isDark ? 'rgba(235,230,220,ALPHA)' : 'rgba(22,20,18,ALPHA)';
const FONT_SC = '500 10px -apple-system, sans-serif';
const LETTER_SP = 2.2;
const PHRASE_SEP = 18;

function toSC(s) { return s.toUpperCase(); }

const allPhrases = [
  "Global poverty and economic inequality",
  "Gender-based violence and domestic abuse",
  "Labor exploitation",
  "Refugee crises and forced migration",
  "Systemic racism and racial injustice",
  "Healthcare accessibility and affordability",
  "Access to Education",
  "Energy sustainability and transition",
  "Aging population care and support",
  "Youth unemployment",
  "Artificial intelligence ethics and governance",
  "Organized crime and corruption",
  "Climate change",
  "Misinformation and disinformation",
].map(toSC);

const R_TIGHT = 115, R_LOOSE = 340;

function knotXY(t, R) {
  const phi = 5*t, theta = 7*t;
  const r = R*0.55 + R*0.45*Math.cos(theta);
  return {
    x: CX() + r*Math.cos(phi),
    y: CY() + r*Math.sin(phi)*0.70 + R*0.45*Math.sin(theta)*0.30
  };
}

function buildKnot(R, N=8000) {
  const pts = [];
  for (let i = 0; i <= N; i++) pts.push(knotXY(i/N*Math.PI*2, R));
  const arc = [0];
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i].x-pts[i-1].x, dy = pts[i].y-pts[i-1].y;
    arc.push(arc[i-1] + Math.sqrt(dx*dx+dy*dy));
  }
  return { pts, arc, len: arc[arc.length-1] };
}

const KT = buildKnot(R_TIGHT), KL = buildKnot(R_LOOSE);
let tightness = 1.0, tgtTight = 1.0;

function knotPtAtS(knot, s) {
  const { pts, arc } = knot;
  s = ((s % knot.len) + knot.len) % knot.len;
  let lo = 0, hi = pts.length-1;
  while (lo < hi-1) { const m=(lo+hi)>>1; arc[m]<=s?(lo=m):(hi=m); }
  const t = (s-arc[lo])/(arc[hi]-arc[lo]||1);
  const ni = Math.min(lo+5, pts.length-1);
  return {
    x: pts[lo].x + t*(pts[hi].x-pts[lo].x),
    y: pts[lo].y + t*(pts[hi].y-pts[lo].y),
    angle: Math.atan2(pts[ni].y-pts[lo].y, pts[ni].x-pts[lo].x)
  };
}

function knotPt(s) {
  const k = 1-tightness;
  const pl = knotPtAtS(KL, s);
  const pt = knotPtAtS(KT, s/KL.len*KT.len);
  return {
    x: pt.x+(pl.x-pt.x)*k,
    y: pt.y+(pl.y-pt.y)*k,
    angle: pt.angle+(pl.angle-pt.angle)*k
  };
}

function knotLen() { return KT.len+(KL.len-KT.len)*(1-tightness); }

const MARGIN = 10;
function currentR()   { return R_TIGHT+(R_LOOSE-R_TIGHT)*(1-tightness); }
function leftTailW()  { return CX()-currentR()-MARGIN; }
function rightTailW() { return CX()-currentR()-MARGIN; }
function leftTailX()  { return MARGIN; }
function rightTailX() { return CX()+currentR(); }

function pathPt(s) {
  const ltw = leftTailW();
  if (s < ltw) return { x: leftTailX()+s, y: CY(), angle: 0 };
  s -= ltw;
  const kl = knotLen();
  if (s < kl) return knotPt(s/kl*KL.len);
  s -= kl;
  return { x: rightTailX()+s, y: CY(), angle: 0 };
}

ctx.font = FONT_SC;
function getCW(ch) { return ctx.measureText(ch).width; }

let charSeq = [];
function buildCharSeq() {
  charSeq = [];
  let cumW = 0;
  allPhrases.forEach((phrase, pi) => {
    for (let i = 0; i < phrase.length; i++) {
      const ch = phrase[i];
      charSeq.push({ ch, pi, cumW });
      cumW += getCW(ch) + LETTER_SP;
    }
    if (pi < allPhrases.length-1) cumW += PHRASE_SEP - LETTER_SP;
  });
}
buildCharSeq();

let textOffset = 0;
let initialised = false;

// ── DRAW ──────────────────────────────────────────────────────────────────────
function drawCharAt(ch, s, ang) {
  const pt = pathPt(s);
  const charW = getCW(ch);
  ctx.save();
  ctx.translate(pt.x, pt.y);
  ctx.rotate(ang);
  ctx.fillText(ch, -charW/2, 4);
  ctx.restore();
}

function drawTailLeft() {
  const phrase = allPhrases[0];
  const tailW = leftTailW()-4;
  const rawW = [...phrase].reduce((a,ch)=>a+getCW(ch),0);
  const sp = phrase.length>1 ? Math.max(0.5,(tailW-rawW)/(phrase.length-1)) : LETTER_SP;
  ctx.save(); ctx.font=FONT_SC;
  ctx.fillStyle = FG.replace('ALPHA','0.85');
  ctx.textBaseline = 'middle';
  let x = leftTailX()+2;
  for (const ch of phrase) { ctx.fillText(ch, x, CY()); x += getCW(ch)+sp; }
  ctx.textBaseline='alphabetic'; ctx.restore();
}

function drawTailRight() {
  const phrase = allPhrases[allPhrases.length-1];
  const tailW = rightTailW()-4;
  const rawW = [...phrase].reduce((a,ch)=>a+getCW(ch),0);
  const sp = phrase.length>1 ? Math.max(0.5,(tailW-rawW)/(phrase.length-1)) : LETTER_SP;
  ctx.save(); ctx.font=FONT_SC;
  ctx.fillStyle = FG.replace('ALPHA','0.85');
  ctx.textBaseline = 'middle';
  let x = rightTailX()+2;
  for (const ch of phrase) { ctx.fillText(ch, x, CY()); x += getCW(ch)+sp; }
  ctx.textBaseline='alphabetic'; ctx.restore();
}

function drawKnot() {
  ctx.font = FONT_SC;
  ctx.fillStyle = FG.replace('ALPHA','0.85');

  const knotStart = 1, knotEnd = allPhrases.length-2;
  const firstKnotChar = charSeq.find(c => c.pi === knotStart);
  if (!firstKnotChar) return;

  const knotArcStart = leftTailW();
  const textArcStart = knotArcStart - firstKnotChar.cumW;
  const kl = knotLen();

  let pi = -1, phraseChars = [];

  function flushPhrase() {
    if (!phraseChars.length) return;
    const first = phraseChars[0];
    const last  = phraseChars[phraseChars.length-1];
    const midS  = textArcStart + textOffset + (first.cumW + last.cumW + getCW(last.ch)) / 2;
    const midPt = pathPt(midS);
    let ang = midPt.angle;
    while (ang >  Math.PI) ang -= Math.PI*2;
    while (ang < -Math.PI) ang += Math.PI*2;
    const leftward = Math.abs(ang) > Math.PI/2;

    if (!leftward) {
      for (const { ch, cumW } of phraseChars) {
        const s = textArcStart + textOffset + cumW + getCW(ch)/2;
        if (s < knotArcStart - 20 || s > knotArcStart + kl + 20) continue;
        const pt = pathPt(s);
        let a = pt.angle;
        while (a >  Math.PI) a -= Math.PI*2;
        while (a < -Math.PI) a += Math.PI*2;
        drawCharAt(ch, s, a);
      }
    } else {
      const totalPhraseW = last.cumW + getCW(last.ch) - first.cumW;
      for (const { ch, cumW } of phraseChars) {
        const localOffset = cumW - first.cumW;
        const mirroredOffset = totalPhraseW - localOffset - getCW(ch);
        const s = textArcStart + textOffset + first.cumW + mirroredOffset + getCW(ch)/2;
        if (s < knotArcStart - 20 || s > knotArcStart + kl + 20) continue;
        const pt = pathPt(s);
        let a = pt.angle;
        while (a >  Math.PI) a -= Math.PI*2;
        while (a < -Math.PI) a += Math.PI*2;
        drawCharAt(ch, s, a + Math.PI);
      }
    }
    phraseChars = [];
  }

  charSeq.forEach(({ ch, pi: cpi, cumW }) => {
    if (cpi < knotStart || cpi > knotEnd) return;
    if (cpi !== pi) { flushPhrase(); pi = cpi; }
    phraseChars.push({ ch, cumW });
  });
  flushPhrase();
}

// ── INTERACTION ───────────────────────────────────────────────────────────────
let isDragging = false;
let tailDrag = null, tailDragX0 = 0, tailDragTight0 = 1.0;
let dragLastX = 0;

function cxy(e) { const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }

function hitTest(mx, my) {
  if (Math.abs(my-CY()) < 22) {
    if (mx>=MARGIN && mx<=leftTailX()+leftTailW()) return {type:'tail',side:'left'};
    if (mx>=rightTailX() && mx<=rightTailX()+rightTailW()) return {type:'tail',side:'right'};
  }
  const dist = Math.sqrt((mx-CX())**2+(my-CY())**2);
  if (dist < currentR()*1.35) return {type:'knot'};
  return null;
}

canvas.addEventListener('pointerdown', e => {
  canvas.style.cursor = 'grabbing';
  const {x,y} = cxy(e);
  const hit = hitTest(x,y);
  if (!hit) return;
  if (hit.type === 'tail') {
    tailDrag=hit.side; tailDragX0=e.clientX; tailDragTight0=tightness;
  } else {
    isDragging=true; dragLastX=e.clientX;
  }
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', e => {
  if (tailDrag) {
    const dx = e.clientX-tailDragX0;
    const pull = tailDrag==='left'?-dx:dx;
    tgtTight = Math.max(0.02,Math.min(1.0,tailDragTight0+pull/200));
    return;
  }
  if (!isDragging) return;
  const {x,y} = cxy(e);
  const dx = e.clientX-dragLastX;
  textOffset += dx*0.012;
  const dist = Math.sqrt((x-CX())**2+(y-CY())**2);
  const looseness = Math.min(1,Math.max(0,(dist-R_TIGHT*0.3)/(R_LOOSE*1.4-R_TIGHT*0.3)));
  tgtTight = Math.min(tgtTight, 1-looseness*0.99);
  dragLastX = e.clientX;
});

canvas.addEventListener('pointerup', () => {
  isDragging=false; tailDrag=null;
  canvas.style.cursor='grab';
});

// ── LOOP ──────────────────────────────────────────────────────────────────────
function tick() {
  ctx.clearRect(0,0,W(),H());
  tightness = Math.max(0.02,Math.min(1.0,tightness+(tgtTight-tightness)*0.018));
  if (!initialised) { textOffset=0; initialised=true; }
  drawTailLeft();
  drawTailRight();
  drawKnot();
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
