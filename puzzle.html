<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22> 🧩 </text></svg>">

  <title>slider puzzle</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    }

    .puzzle-wrapper {
      width: min(90vw, 480px);
      position: relative;
    }

    .puzzle-grid {
      width: 100%;
      display: grid;
      gap: 2px;
      background: #ddd;
    }

    .tile {
      border: none;
      padding: 0;
      margin: 0;
      background-repeat: no-repeat;
      cursor: pointer;
      outline: none;
    }

    .tile.empty {
      background: none;
      cursor: default;
    }

    /* Spark overlay */
    .puzzle-wrapper::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }

    .puzzle-wrapper.spark::after {
      opacity: 1;
      animation: spark 0.8s ease-out forwards;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.9) 0, transparent 60%);
      background-repeat: no-repeat;
      background-position: center;
    }

    @keyframes spark {
      0% {
        transform: scale(0.7);
        opacity: 1;
      }
      100% {
        transform: scale(1.2);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      .puzzle-wrapper {
        width: 100vw;
        margin: 0 8px;
      }
    }

    /* Timer – top left */
    .timer {
      position: fixed;
      top: 12px;
      left: 12px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #0645AD;
      letter-spacing: 0.04em;
      z-index: 20;
      transition: color 0.3s ease;
    }

    .timer.done {
      color: #2a7a2a;
    }

    /* Tiny upload icon – bottom right, "internet blue" */
    .upload-button {
      position: fixed;
      bottom: 12px;
      right: 12px;
      padding: 4px;
      border: none;
      background: transparent;
      color: #0645AD;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      z-index: 20;
    }

    .upload-button:focus-visible {
      outline: 2px solid #0645AD;
      outline-offset: 2px;
    }

    /* Eye (view reference) icon – top right */
    .view-button {
      position: fixed;
      top: 12px;
      right: 12px;
      padding: 4px;
      border: none;
      background: transparent;
      color: #0645AD;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      z-index: 20;
    }

    .view-button:focus-visible {
      outline: 2px solid #0645AD;
      outline-offset: 2px;
    }

    /* Modal for reference image */
    .reference-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      z-index: 30;
    }

    .reference-modal.open {
      display: block;
    }

    .reference-inner {
      max-width: 100vw;
      max-height: 100vh;
    }

    .reference-inner img {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 45vw;
      max-height: 45vh;
      display: block;
    }
  </style>
</head>
<body>
  <!-- Timer display -->
  <div id="timer" class="timer">0:00</div>

  <div class="puzzle-wrapper">
    <div id="puzzle" class="puzzle-grid"></div>
  </div>

  <!-- Eye icon to view reference image -->
  <button
    id="view-button"
    class="view-button"
    type="button"
    title="View reference image">
    👁
  </button>

  <!-- Tiny upload icon (bottom right) -->
  <button
    id="upload-button"
    class="upload-button"
    type="button"
    title="Upload your own image">
    📁
  </button>
  <input type="file" id="image-input" accept="image/*" style="display:none" />

  <!-- Reference image modal -->
  <div id="reference-modal" class="reference-modal">
    <div class="reference-inner">
      <img id="reference-image" alt="Reference image">
    </div>
  </div>

  <!-- Lego click sound -->
  <audio
    id="slide-sound"
    src="lego-click-short.wav"
    preload="auto">
  </audio>

  <script>
    const TOTAL = 12;
    const EMPTY = TOTAL - 1;
    const puzzleEl = document.getElementById('puzzle');
    const wrapperEl = document.querySelector('.puzzle-wrapper');
    const slideSound = document.getElementById('slide-sound');
    const uploadBtn = document.getElementById('upload-button');
    const fileInput = document.getElementById('image-input');
    const viewBtn = document.getElementById('view-button');
    const modalEl = document.getElementById('reference-modal');
    const modalImg = document.getElementById('reference-image');
    const timerEl = document.getElementById('timer');

    // --- Timer state ---
    let timerInterval = null;
    let timerSeconds = 0;
    let timerStarted = false;

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function startTimer() {
      if (timerStarted) return;
      timerStarted = true;
      timerInterval = setInterval(() => {
        timerSeconds++;
        timerEl.textContent = formatTime(timerSeconds);
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerEl.classList.add('done');
      timerEl.textContent = formatTime(timerSeconds) + ' ✓';
    }

    function resetTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      timerSeconds = 0;
      timerStarted = false;
      timerEl.textContent = '0:00';
      timerEl.classList.remove('done');
    }

    // --- Image setup ---
    const IMAGE_LANDSCAPE = 'https://drive.google.com/file/d/1YG_3znrV0uJvWdPP3trPIFqClv4R4NiB/view?usp=drive_link';
    const IMAGE_PORTRAIT  = 'https://drive.google.com/file/d/1TLnm0Df8E4RZgUnYu0jOU11BdOWpqJOg/view?usp=drive_link';

    const imageInfo = {
      landscape: { src: IMAGE_LANDSCAPE, width: 0, height: 0, loaded: false },
      portrait:  { src: IMAGE_PORTRAIT,  width: 0, height: 0, loaded: false }
    };

    ['landscape', 'portrait'].forEach(key => {
      const info = imageInfo[key];
      const img = new Image();
      img.src = info.src;
      img.onload = () => {
        info.width = img.naturalWidth;
        info.height = img.naturalHeight;
        info.loaded = true;
        render();
      };
    });

    let currentObjectUrl = null;
    let state = Array.from({ length: TOTAL }, (_, i) => i);
    let ORIENTATION = null;
    let ROWS = 3;
    let COLS = 4;
    let completed = false;

    function setOrientation() {
      const isMobile = window.matchMedia("(max-width: 600px)").matches;
      const newOrientation = isMobile ? 'portrait' : 'landscape';

      if (newOrientation === ORIENTATION) {
        render();
        return;
      }

      ORIENTATION = newOrientation;

      if (ORIENTATION === 'landscape') {
        ROWS = 3; COLS = 4;
      } else {
        ROWS = 4; COLS = 3;
      }

      state = Array.from({ length: TOTAL }, (_, i) => i);
      completed = false;
      resetTimer();
      shuffle(200);
      render();
    }

    function getNeighbors(index) {
      const row = Math.floor(index / COLS);
      const col = index % COLS;
      const neighbors = [];
      if (row > 0) neighbors.push(index - COLS);
      if (row < ROWS - 1) neighbors.push(index + COLS);
      if (col > 0) neighbors.push(index - 1);
      if (col < COLS - 1) neighbors.push(index + 1);
      return neighbors;
    }

    function shuffle(moves = 200) {
      let emptyPos = state.indexOf(EMPTY);
      for (let i = 0; i < moves; i++) {
        const neighbors = getNeighbors(emptyPos);
        const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
        [state[emptyPos], state[randomNeighbor]] = [state[randomNeighbor], state[emptyPos]];
        emptyPos = randomNeighbor;
      }
    }

    function isSolved() {
      return state.every((value, index) => value === index);
    }

    function handleTileClick(positionIndex) {
      if (completed) return;

      const emptyPos = state.indexOf(EMPTY);
      const neighbors = getNeighbors(emptyPos);
      if (!neighbors.includes(positionIndex)) return;

      // Start timer on first move
      startTimer();

      [state[emptyPos], state[positionIndex]] = [state[positionIndex], state[emptyPos]];

      if (slideSound) {
        try {
          slideSound.currentTime = 0;
          slideSound.volume = 0.25;
          slideSound.play().catch(() => {});
        } catch (e) {}
      }

      render();

      if (isSolved()) {
        celebrate();
      }
    }

    function celebrate() {
      completed = true;
      stopTimer();
      render();

      if (!wrapperEl) return;
      wrapperEl.classList.remove('spark');
      void wrapperEl.offsetWidth;
      wrapperEl.classList.add('spark');
      setTimeout(() => wrapperEl.classList.remove('spark'), 900);
    }

    function render() {
      if (!ORIENTATION) return;

      const key = ORIENTATION === 'landscape' ? 'landscape' : 'portrait';
      const info = imageInfo[key];
      if (!info.loaded) return;

      if (modalImg) modalImg.src = info.src;

      puzzleEl.innerHTML = '';
      puzzleEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
      puzzleEl.style.gridTemplateRows = `repeat(${ROWS}, 1fr)`;
      puzzleEl.style.aspectRatio = `${COLS} / ${ROWS}`;

      const puzzleWidth = puzzleEl.clientWidth || puzzleEl.offsetWidth;
      const puzzleHeight = puzzleWidth * (ROWS / COLS);
      const tileWidth = puzzleWidth / COLS;
      const tileHeight = puzzleHeight / ROWS;

      const imgWidth = info.width;
      const imgHeight = info.height;
      const containerRatio = puzzleWidth / puzzleHeight;
      const imgRatio = imgWidth / imgHeight;

      let displayWidth, displayHeight, offsetX = 0, offsetY = 0;

      if (imgRatio > containerRatio) {
        displayHeight = puzzleHeight;
        displayWidth = displayHeight * imgRatio;
        offsetX = (displayWidth - puzzleWidth) / 2;
      } else {
        displayWidth = puzzleWidth;
        displayHeight = displayWidth / imgRatio;
        offsetY = (displayHeight - puzzleHeight) / 2;
      }

      state.forEach((tileNum, positionIndex) => {
        const tile = document.createElement('button');
        tile.className = 'tile';

        if (tileNum === EMPTY && !completed) {
          tile.classList.add('empty');
          puzzleEl.appendChild(tile);
          return;
        }

        const originalRow = Math.floor(tileNum / COLS);
        const originalCol = tileNum % COLS;
        const bgX = originalCol * tileWidth + offsetX;
        const bgY = originalRow * tileHeight + offsetY;

        tile.style.backgroundImage = `url('${info.src}')`;
        tile.style.backgroundSize = `${displayWidth}px ${displayHeight}px`;
        tile.style.backgroundPosition = `-${bgX}px -${bgY}px`;

        tile.addEventListener('click', () => handleTileClick(positionIndex));
        puzzleEl.appendChild(tile);
      });
    }

    function useCustomImage(file) {
      if (!file || !file.type.startsWith('image/')) return;

      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
      }

      const url = URL.createObjectURL(file);
      currentObjectUrl = url;

      const img = new Image();
      img.onload = () => {
        ['landscape', 'portrait'].forEach(key => {
          imageInfo[key].src = url;
          imageInfo[key].width = img.naturalWidth;
          imageInfo[key].height = img.naturalHeight;
          imageInfo[key].loaded = true;
        });

        completed = false;
        state = Array.from({ length: TOTAL }, (_, i) => i);
        resetTimer();
        shuffle(200);
        render();
      };
      img.src = url;
    }

    window.addEventListener('resize', () => setOrientation());

    if (uploadBtn && fileInput) {
      uploadBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
          useCustomImage(e.target.files[0]);
          e.target.value = '';
        }
      });
    }

    if (wrapperEl) {
      ['dragover', 'dragenter'].forEach(evt => {
        wrapperEl.addEventListener(evt, e => e.preventDefault());
      });
      wrapperEl.addEventListener('drop', e => {
        e.preventDefault();
        if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) {
          useCustomImage(e.dataTransfer.files[0]);
        }
      });
    }

    if (viewBtn && modalEl) {
      viewBtn.addEventListener('click', () => modalEl.classList.add('open'));
      modalEl.addEventListener('click', (e) => {
        if (e.target === modalEl) modalEl.classList.remove('open');
      });
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') modalEl.classList.remove('open');
      });
    }

    setOrientation();
  </script>
</body>
</html>
